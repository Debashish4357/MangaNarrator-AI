version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: manga_narrator_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manga_narrator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d manga_narrator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - manga_network
    restart: always

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: manga_narrator_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@manganarrator.local
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - manga_network
    restart: always

networks:
  manga_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
